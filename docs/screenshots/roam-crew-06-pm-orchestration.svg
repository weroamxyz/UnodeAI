<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Project Manager orchestration and Messages panel</title>
  <desc id="desc">A split view showing PM chat assigning tasks and the Messages activity feed showing cross-agent updates.</desc>
  <defs>
    <style>
      .bg{fill:#1e1e1e}.pane{fill:#181818;stroke:#333}.card{fill:#252526;stroke:#464646}.line{stroke:#7c4dff;stroke-width:4}.text{font-family:Segoe UI,Arial,sans-serif;fill:#d4d4d4}.muted{fill:#a7adb7}.accent{fill:#b392ff}.green{fill:#6bd883}.yellow{fill:#ffd166}.red{fill:#ff6b6b}.small{font-size:18px}.mid{font-size:23px}.big{font-size:30px;font-weight:700}.tiny{font-size:15px}
    </style>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <rect class="pane" x="70" y="58" width="540" height="614" rx="10"/>
  <rect class="pane" x="670" y="58" width="540" height="614" rx="10"/>
  <text class="text big" x="104" y="112">Chat - Project Manager</text>
  <text class="text big" x="704" y="112">Messages</text>
  <rect class="card" x="104" y="150" width="472" height="78" rx="8"/>
  <text class="accent small" x="130" y="181">Goal received</text>
  <text class="muted tiny" x="130" y="207">Create login flow, verify tests, summarize changes.</text>
  <rect class="card" x="104" y="250" width="472" height="78" rx="8"/>
  <text class="green small" x="130" y="281">assign_task -> Architect</text>
  <text class="muted tiny" x="130" y="307">Define auth contract and routes.</text>
  <rect class="card" x="104" y="350" width="472" height="78" rx="8"/>
  <text class="green small" x="130" y="381">assign_task -> Developer</text>
  <text class="muted tiny" x="130" y="407">Implement middleware, UI, and tests.</text>
  <rect class="card" x="104" y="450" width="472" height="78" rx="8"/>
  <text class="yellow small" x="130" y="481">run_checks</text>
  <text class="muted tiny" x="130" y="507">Runs configured verify command when approved.</text>
  <rect class="card" x="704" y="150" width="472" height="68" rx="8"/>
  <circle cx="730" cy="184" r="8" fill="#6bd883"/>
  <text class="text small" x="750" y="181">PM assigned auth contract</text>
  <text class="muted tiny" x="750" y="203">to Architect</text>
  <rect class="card" x="704" y="238" width="472" height="68" rx="8"/>
  <circle cx="730" cy="272" r="8" fill="#6bd883"/>
  <text class="text small" x="750" y="269">Architect completed design</text>
  <text class="muted tiny" x="750" y="291">routes, payloads, and file ownership</text>
  <rect class="card" x="704" y="326" width="472" height="68" rx="8"/>
  <circle cx="730" cy="360" r="8" fill="#ffd166"/>
  <text class="text small" x="750" y="357">Developer running</text>
  <text class="muted tiny" x="750" y="379">editing src/auth and tests</text>
  <rect class="card" x="704" y="414" width="472" height="68" rx="8"/>
  <circle cx="730" cy="448" r="8" fill="#ff6b6b"/>
  <text class="text small" x="750" y="445">Reviewer found test gap</text>
  <text class="muted tiny" x="750" y="467">PM routes fix back to Developer</text>
  <path class="line" d="M610 342h60"/>
  <path d="M670 342l-18-12v24z" fill="#7c4dff"/>
  <text class="text big" x="104" y="714">6. PM orchestration is visible in chat and in the activity feed</text>
</svg>
