<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Roam Crew Marketplace panel placeholder</title>
  <desc id="desc">A placeholder guide image showing the Roam Crew Marketplace with tabs for Agents, MCP, and Skills.</desc>
  <defs>
    <style>
      .bg{fill:#1e1e1e}.panel{fill:#181818;stroke:#333}.card{fill:#252526;stroke:#464646}.tab{fill:#2d2d30}.active{fill:#7c4dff}.btn{fill:#0e639c}.disabled{fill:#343434;stroke:#464646}.text{font-family:Segoe UI,Arial,sans-serif;fill:#d4d4d4}.muted{fill:#a7adb7}.accent{fill:#b392ff}.green{fill:#6bd883}.small{font-size:18px}.mid{font-size:23px}.big{font-size:30px;font-weight:700}.tiny{font-size:15px}
    </style>
  </defs>
  <rect class="bg" width="1280" height="760"/>
