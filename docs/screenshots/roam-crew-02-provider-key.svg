<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Set provider API key flow</title>
  <desc id="desc">A Roam Crew setup flow showing selection of ROAM_API_KEY and a masked token input.</desc>
  <defs>
    <style>
      .bg{fill:#1e1e1e}.panel{fill:#202124;stroke:#3c3c3c}.box{fill:#2a2d2e;stroke:#4b4f57}.active{fill:#313236;stroke:#7c4dff}.text{font-family:Segoe UI,Arial,sans-serif;fill:#d4d4d4}.muted{fill:#a7adb7}.accent{fill:#b392ff}.ok{fill:#6bd883}.small{font-size:19px}.mid{font-size:25px}.big{font-size:30px;font-weight:700}.label{font-size:17px;fill:#a7adb7}
    </style>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <rect class="panel" x="138" y="96" width="1004" height="520" rx="12"/>
  <text class="text big" x="188" y="154">2. Set Provider API Key</text>
  <text class="muted small" x="188" y="190">Command: Roam Crew: Set Provider API Key</text>
  <rect class="active" x="188" y="238" width="380" height="234" rx="8"/>
  <text class="text mid" x="218" y="284">Choose secret</text>
  <rect class="box" x="218" y="318" width="300" height="44" rx="5"/>
  <text class="ok small" x="238" y="346">ROAM_API_KEY</text>
  <rect class="box" x="218" y="374" width="300" height="44" rx="5"/>
  <text class="text small" x="238" y="402">OPENAI_API_KEY</text>
  <rect class="box" x="218" y="430" width="300" height="44" rx="5"/>
  <text class="text small" x="238" y="458">ANTHROPIC_API_KEY</text>
  <path d="M590 354h122" stroke="#7c4dff" stroke-width="4"/>
  <path d="M712 354l-18-12v24z" fill="#7c4dff"/>
  <rect class="active" x="744" y="238" width="348" height="234" rx="8"/>
  <text class="text mid" x="774" y="284">Paste token</text>
  <text class="label" x="774" y="326">Input is masked by VS Code</text>
  <rect class="box" x="774" y="350" width="268" height="48" rx="5"/>
  <text class="text mid" x="798" y="382">************************</text>
  <rect x="774" y="424" width="136" height="38" rx="5" fill="#0e639c"/>
  <text class="text small" x="814" y="449">Save</text>
  <text class="muted small" x="188" y="544">Keys are stored in VS Code SecretStorage. They are not written to .roam/team.json.</text>
</svg>
