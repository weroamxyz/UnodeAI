<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Roam Crew Settings panel</title>
  <desc id="desc">The Settings panel showing tabs for Providers, Model Tuning, Smart Mode, MCP Servers, and More.</desc>
  <defs>
    <style>
      .bg{fill:#1e1e1e}.panel{fill:#181818;stroke:#333}.card{fill:#252526;stroke:#464646}.tab{fill:#2d2d30}.active{fill:#7c4dff}.input{fill:#1e1e1e;stroke:#555}.text{font-family:Segoe UI,Arial,sans-serif;fill:#d4d4d4}.muted{fill:#a7adb7}.green{fill:#6bd883}.yellow{fill:#ffd166}.small{font-size:18px}.mid{font-size:23px}.big{font-size:30px;font-weight:700}.tiny{font-size:15px}
    </style>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <rect class="panel" x="88" y="52" width="1104" height="642" rx="10"/>
  <text class="text big" x="130" y="106">Roam Crew Settings</text>
  <text class="muted small" x="130" y="138">API keys never leave SecretStorage.</text>
  <g transform="translate(130 174)">
    <rect class="tab" width="132" height="42" rx="5"/><rect class="active" y="39" width="132" height="3"/><text class="text small" x="25" y="27">Providers</text>
    <rect class="tab" x="140" width="160" height="42" rx="5"/><text class="muted small" x="163" y="27">Model Tuning</text>
    <rect class="tab" x="308" width="144" height="42" rx="5"/><text class="muted small" x="333" y="27">Smart Mode</text>
    <rect class="tab" x="460" width="146" height="42" rx="5"/><text class="muted small" x="486" y="27">MCP Servers</text>
    <rect class="tab" x="614" width="90" height="42" rx="5"/><text class="muted small" x="637" y="27">More</text>
  </g>
  <rect class="card" x="130" y="248" width="460" height="104" rx="8"/>
  <text class="text mid" x="158" y="288">Roam</text>
  <text class="muted tiny" x="158" y="316">ROAM_API_KEY - https://www.unodetech.xyz/v1</text>
  <rect x="458" y="270" width="94" height="28" rx="14" fill="#143d20"/><text class="green tiny" x="482" y="289">Key set</text>
  <rect class="card" x="130" y="372" width="460" height="104" rx="8"/>
  <text class="text mid" x="158" y="412">OpenAI</text>
  <text class="muted tiny" x="158" y="440">OPENAI_API_KEY</text>
  <rect x="438" y="394" width="114" height="28" rx="14" fill="#4a3a12"/><text class="yellow tiny" x="463" y="413">Not set</text>
  <rect class="card" x="636" y="248" width="500" height="250" rx="8"/>
  <text class="text mid" x="664" y="288">Model Tuning preview</text>
  <text class="muted tiny" x="664" y="316">Developer - deepseek-v4-flash</text>
  <text class="muted tiny" x="664" y="352">Temperature</text><rect class="input" x="800" y="332" width="100" height="34" rx="4"/><text class="text tiny" x="837" y="354">0.7</text>
  <text class="muted tiny" x="664" y="398">Max Tokens</text><rect class="input" x="800" y="378" width="100" height="34" rx="4"/><text class="text tiny" x="828" y="400">4096</text>
  <text class="muted tiny" x="664" y="444">Context Window</text><rect class="input" x="800" y="424" width="146" height="34" rx="4"/><text class="text tiny" x="829" y="446">128000</text>
  <rect x="980" y="424" width="86" height="34" rx="5" fill="#0e639c"/><text class="text tiny" x="1010" y="446">Save</text>
  <rect class="card" x="130" y="528" width="1006" height="78" rx="8"/>
  <text class="text mid" x="158" y="562">Native settings</text>
  <text class="muted tiny" x="158" y="588">Configure command approval, write approval, concurrency, logging, and verify command.</text>
  <text class="text big" x="130" y="650">7. Tune providers, model behavior, Smart Mode, MCP, and safety</text>
</svg>
