<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Empty Roam Crew Team panel</title>
  <desc id="desc">The Roam Crew sidebar showing an empty Team panel with Create a Team, Run Demo Task, and Open Documentation actions.</desc>
  <defs>
    <style>
      .bg{fill:#1e1e1e}.activity{fill:#252526}.sidebar{fill:#181818;stroke:#333}.tab{fill:#232323}.card{fill:#252526;stroke:#464646}.card2{fill:#2b2d30;stroke:#7c4dff}.text{font-family:Segoe UI,Arial,sans-serif;fill:#d4d4d4}.muted{fill:#a7adb7}.accent{fill:#b392ff}.small{font-size:18px}.mid{font-size:24px}.big{font-size:30px;font-weight:700}
    </style>
  </defs>
  <rect class="bg" width="1280" height="760"/>
  <rect class="activity" width="72" height="760"/>
  <circle cx="36" cy="92" r="18" fill="#7c4dff"/>
  <text class="text small" x="22" y="99">RC</text>
  <rect class="sidebar" x="72" y="0" width="426" height="760"/>
  <rect class="tab" x="72" y="0" width="426" height="46"/>
  <text class="text small" x="94" y="30">ROAM CREW</text>
  <text class="text mid" x="96" y="86">Team - v0.6.10</text>
  <text class="muted small" x="151" y="176">No agents in your team yet.</text>
  <rect class="card2" x="112" y="218" width="328" height="82" rx="8"/>
  <text class="text mid" x="136" y="253">Create a Team</text>
  <text class="muted small" x="136" y="282">Pick a software crew or specialists</text>
  <rect class="card" x="112" y="316" width="328" height="82" rx="8"/>
  <text class="text mid" x="136" y="351">Run Demo Task</text>
  <text class="muted small" x="136" y="380">See Roam Crew in action</text>
  <rect class="card" x="112" y="414" width="328" height="82" rx="8"/>
  <text class="text mid" x="136" y="449">Open Documentation</text>
  <text class="muted small" x="136" y="478">Learn agents, teams, workflows</text>
  <rect class="card" x="165" y="526" width="220" height="42" rx="6"/>
  <text class="text small" x="196" y="553">Add a single agent</text>
  <text class="text big" x="560" y="230">3. Open the Roam Crew sidebar</text>
  <text class="muted mid" x="560" y="278">Start with a preset team, demo task,</text>
  <text class="muted mid" x="560" y="310">or add one agent at a time.</text>
  <path d="M528 254h-66" stroke="#7c4dff" stroke-width="4"/>
  <path d="M462 254l18-12v24z" fill="#7c4dff"/>
</svg>
